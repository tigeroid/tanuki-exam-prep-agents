# IT Project Management Professional (ITPMP) Exam Configuration
# Generic certification template demonstrating plugin flexibility

code: itpmp
name: IT Project Management Professional

format:
  total_questions: 150  # Longer exam than RIMS
  passing_score: 65    # Different passing threshold
  question_type: multiple-choice-4  # 4 options per question
  time_limit_minutes: 180  # 3 hours

# Four ITPMP Domains (different structure than RIMS' 5 domains)
# Weights must sum to 100%
domains:
  - code: initiation-planning
    name: Project Initiation and Planning
    description: Define project objectives, develop comprehensive project plans, establish scope, schedule, budget, and resource allocations. Includes stakeholder identification and requirements gathering.
    weight: 30

  - code: execution-delivery
    name: Project Execution and Delivery
    description: Lead project teams, manage resources, implement quality assurance processes, and deliver project outputs according to plan. Coordinate cross-functional teams and manage vendor relationships.
    weight: 35

  - code: monitoring-control
    name: Monitoring and Control
    description: Track project performance, manage changes, control scope creep, monitor risks and issues, and ensure projects stay on track. Implement earned value management and performance metrics.
    weight: 25

  - code: closure-optimization
    name: Project Closure and Continuous Improvement
    description: Formalize project acceptance, conduct lessons learned sessions, archive project documentation, and implement continuous improvement processes for future projects.
    weight: 10

