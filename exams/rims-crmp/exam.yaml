# RIMS-CRMP (Certified Risk Management Professional) Exam Configuration
# Based on official exam structure and course materials

code: rims-crmp
name: RIMS-CRMP Certification

format:
  total_questions: 100  # 100 scored questions (+ 20 unscored pretest items not included in final score)
  passing_score: 71    # 71% required to pass
  question_type: multiple-choice-4  # 4 options per question, single best answer
  time_limit_minutes: 120  # 120 minutes (2 hours)

# Five RIMS-CRMP Domains (weights must sum to 100%)
domains:
  - code: domain-a
    name: Analyzing the Organizational Risk Model
    description: Understand organizational context, risk models, and enterprise risk assessment frameworks including COSO ERM, ISO 31000, and risk appetite concepts
    weight: 16

  - code: domain-b
    name: Designing Risk Management Strategies
    description: Design risk treatment strategies, develop risk appetite frameworks, and create comprehensive risk management approaches aligned with organizational objectives
    weight: 26

  - code: domain-c
    name: Implementing Risk Management Processes
    description: Execute risk management processes, implement controls, monitor KRIs/KPIs, and maintain risk registers and reporting systems (32% - highest weighted domain)
    weight: 32

  - code: domain-d
    name: Developing Risk Competency
    description: Build risk culture, develop training programs, establish governance structures, and promote risk awareness across the organization
    weight: 16

  - code: domain-e
    name: Supporting Decision Making
    description: Provide risk-informed insights to support strategic and operational decision-making, including scenario analysis and risk reporting
    weight: 10

# Resources mapped to domains
# Note: Set the EXAM_PREP_RESOURCES environment variable to the directory containing your study materials
# Example: export EXAM_PREP_RESOURCES="/Users/yourname/rims-study-materials"
